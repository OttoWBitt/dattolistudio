name: Merge type reminder

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Comment merge type
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="${{ github.base_ref }}"

          if [ "$BASE" = "main" ]; then
            MESSAGE=$(cat <<'EOF'
## ⚠️ Tipo de merge obrigatório

Este PR vai para `main`. Use **Merge commit** — não use squash nem rebase.
EOF
            )
          elif [ "$BASE" = "develop" ]; then
            MESSAGE=$(cat <<'EOF'
## ⚠️ Tipo de merge obrigatório

Este PR vai para `develop`. Use **Squash merge** — mantém o histórico limpo.
EOF
            )
          else
            exit 0
          fi

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$MESSAGE"
