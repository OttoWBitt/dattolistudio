name: Merge type reminder

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Comment merge type
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="${{ github.base_ref }}"
          if [ "$BASE" = "main" ]; then
            printf '## Tipo de merge obrigatorio\n\nEste PR vai para `main`. Use **Merge commit** - nao use squash nem rebase.' > /tmp/msg.md
          elif [ "$BASE" = "develop" ]; then
            printf '## Tipo de merge obrigatorio\n\nEste PR vai para `develop`. Use **Squash merge** - mantem o historico limpo.' > /tmp/msg.md
          else
            exit 0
          fi
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/msg.md
