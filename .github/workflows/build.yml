name: Deploy

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/ottowbitt/dattolistudio:${{ steps.tag.outputs.tag }}

      - name: Update k3s-infra
        env:
          INFRA_TOKEN: ${{ secrets.INFRA_TOKEN }}
        run: |
          git clone https://OttoWBitt:${INFRA_TOKEN}@github.com/OttoWBitt/k3s-infra.git
          cd k3s-infra
          git config user.email "deploy-bot@ottobittencourt.com"
          git config user.name "deploy-bot"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            sed -i "s|ghcr.io/ottowbitt/dattolistudio:.*|ghcr.io/ottowbitt/dattolistudio:${{ steps.tag.outputs.tag }}|" clusters/vm-1/apps/dattolistudio/prod/deployment.yaml
          else
            sed -i "s|ghcr.io/ottowbitt/dattolistudio:.*|ghcr.io/ottowbitt/dattolistudio:${{ steps.tag.outputs.tag }}|" clusters/vm-1/apps/dattolistudio/sandbox/deployment.yaml
          fi
          git commit -am "deploy dattolistudio@${{ steps.tag.outputs.tag }}"
          git push
