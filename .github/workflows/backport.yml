name: Backport main → develop

on:
  push:
    branches:
      - main

jobs:
  backport:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create backport PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base develop --head main --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR de backport já existe: #$EXISTING"
            exit 0
          fi

          gh pr create \
            --base develop \
            --head main \
            --title "chore: backport main → develop" \
            --body "Backport automático após merge na \`main\`."$'\n\n'"**Merge type:** Merge commit"
