name: Backport main to develop

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  backport:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create backport PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base develop --head main --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR de backport ja existe: #$EXISTING"
            exit 0
          fi
          printf 'Backport automatico apos merge na `main`.\n\n## Tipo de merge obrigatorio\n\nUse **Merge commit** - nao use squash nem rebase.' > /tmp/body.md
          gh pr create \
            --base develop \
            --head main \
            --title "chore: backport main to develop" \
            --body-file /tmp/body.md
